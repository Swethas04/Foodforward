<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo1.png">
    <title>Donate Food | FoodForward</title>
    <link rel="stylesheet" href="donate.css">
</head>
<body>

    <nav>
        <div class="logo">
            <img src="logo1.png" alt="FoodForward Logo">
            <h1>FoodForward</h1>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="donate.html" class="active">Donate</a></li>
            <!--<li><a href="search.html">Search</a></li>-->
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>
    <div class="background">
    <div class="container">
        <h2 style="color: rgb(235, 229, 229);">Donate Food</h2>
        <p>Help someone in need by donating excess food.</p>

        <form id="donationForm">
            <label for="donorname">Donor Name:</label>
            <input type="text" id="donorname" name="donorname" placeholder="Enter your Name.." required>

            <label for="foodCategory">Food Category:</label>
            <select id="foodCategory" name="foodCategory" required>
                <option value="" disabled selected>Select a category</option>
            </select>

            <label for="foodType">Food Description:</label>
            <input type="text" id="foodType" name="foodType" placeholder="E.g., Vegetable biryani, 5 lunch boxes" required>

            <label for="foodImage">Food photo <span class="label-note">(optional, max 5MB)</span></label>
            <input type="file" id="foodImage" name="foodImage" accept="image/jpeg,image/png,image/gif,image/webp">
            <div id="imagePreview" class="image-preview" hidden>
                <img id="previewImg" src="" alt="Food preview">
                <button type="button" id="clearImage" class="clear-image-btn">Remove photo</button>
            </div>

            <label>Dietary information <span class="label-note">(select all that apply)</span></label>
            <div id="dietaryOptions" class="checkbox-group"></div>

            <label>Allergen information <span class="label-note">(select any allergens present)</span></label>
            <div id="allergenOptions" class="checkbox-group"></div>
            <label class="checkbox-item none-allergen">
                <input type="checkbox" id="noAllergens" name="noAllergens" value="1">
                <span>No major allergens / not sure</span>
            </label>

            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" placeholder="E.g., 5 servings" required>

            <label for="location">Pickup Location:</label>
            <input type="text" id="location" name="location" placeholder="E.g., Chennai" required>

            <label for="contact">Contact Number:</label>
            <input type="tel" id="contact" name="contact" placeholder="E.g., 9876543210" required>

            <label for="expiry">Food Expiry Time:</label>
            <input type="datetime-local" id="expiry" name="expiry" required>

            <button type="submit" class="donate-btn">Donate Now</button>
        </form>
    </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 FoodForward. All Rights Reserved.</p>
            <p>Designed to Feed Needy, Fight Waste.</p>
        </div>
    </footer>


    <script src="api-config.js"></script>
    <script src="food-meta.js"></script>
    <script src="script.js"></script>
</body>
</html>
